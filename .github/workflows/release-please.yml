name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1; setup-node ships an older npm.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      # No NODE_AUTH_TOKEN: npm authenticates via OIDC against the trusted
      # publisher configured on npmjs.com for this repo + workflow.
      # `npm publish` runs the `prepack` script, which trims .next/{dev,cache,trace}
      # and source maps before the tarball is built. Provenance is automatic.
      - run: npm publish --access public
